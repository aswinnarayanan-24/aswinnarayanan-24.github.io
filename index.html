<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aswin Narayanan</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
 
    body {
      width: 100vw; height: 100vh;
      overflow: hidden;
      font-family: 'Playfair Display', serif;
      background: #0a1628;
    }
 
    /* ── SKY ── */
    .sky {
      position: absolute; inset: 0; height: 58%;
      background: linear-gradient(to bottom,
        #0a1628 0%, #1a3a6b 40%, #c0532a 70%, #ff9a56 85%, #ffd080 100%);
    }
 
    /* ── STARS ── */
    .stars {
      position: absolute; top: 0; left: 0; width: 100%; height: 45%;
      pointer-events: none;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--d, 3s) ease-in-out infinite alternate;
    }
    @keyframes twinkle { from { opacity: 0.2; } to { opacity: 1; } }
 
    /* ── SUN ── */
    .sun {
      position: absolute;
      width: 80px; height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff7aa, #ffd700 40%, #ff8c00);
      box-shadow: 0 0 60px 30px rgba(255,200,50,0.5), 0 0 120px 60px rgba(255,140,0,0.2);
      top: 14%; right: 18%;
      animation: sunPulse 4s ease-in-out infinite alternate;
    }
    @keyframes sunPulse {
      from { box-shadow: 0 0 60px 30px rgba(255,200,50,0.4), 0 0 120px 60px rgba(255,140,0,0.15); }
      to   { box-shadow: 0 0 80px 45px rgba(255,200,50,0.65), 0 0 160px 80px rgba(255,140,0,0.3); }
    }
 
    /* ── CLOUDS ── */
    .cloud {
      position: absolute;
      border-radius: 50px;
      background: rgba(255,200,130,0.22);
      filter: blur(5px);
      animation: cloudDrift linear infinite;
    }
    .cloud::before, .cloud::after {
      content: ''; position: absolute;
      background: inherit; border-radius: 50%;
    }
    .c1 { width:160px; height:38px; top:10%; left:-180px; animation-duration:38s; }
    .c1::before { width:80px; height:58px; top:-26px; left:20px; }
    .c1::after  { width:60px; height:48px; top:-18px; left:70px; }
    .c2 { width:100px; height:26px; top:18%; left:-120px; animation-duration:52s; animation-delay:-18s; opacity:.6; }
    .c2::before { width:50px; height:38px; top:-16px; left:15px; }
    .c3 { width:200px; height:44px; top:7%;  left:-220px; animation-duration:44s; animation-delay:-30s; opacity:.5; }
    .c3::before { width:90px; height:62px; top:-28px; left:30px; }
    .c3::after  { width:70px; height:52px; top:-20px; left:90px; }
    @keyframes cloudDrift { from { left: -250px; } to { left: 110%; } }
 
    /* ── SEAGULLS ── */
    .gull {
      position: absolute;
      animation: gullFly linear infinite;
    }
    @keyframes gullFly {
      0%   { left: -60px; transform: translateY(0); }
      25%  { transform: translateY(-14px); }
      50%  { transform: translateY(4px); }
      75%  { transform: translateY(-10px); }
      100% { left: 110%; transform: translateY(0); }
    }
 
    /* ── SEA ── */
    .sea {
      position: absolute;
      bottom: 18%; left: 0; right: 0;
      height: 32%;
      overflow: hidden;
    }
    .sea-body {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom,
        #1a6fac 0%, #1585c8 30%, #0d6ca0 60%, #0a547d 100%);
    }
    .sea-reflection {
      position: absolute;
      bottom: 0; left: 50%; transform: translateX(-50%);
      width: 200px; height: 100%;
      background: linear-gradient(to bottom, rgba(255,220,100,0.0), rgba(255,180,60,0.35));
      filter: blur(8px);
      animation: reflectShimmer 3s ease-in-out infinite alternate;
    }
    @keyframes reflectShimmer {
      from { width:160px; opacity:.6; }
      to   { width:240px; opacity:1; }
    }
 
    /* Wave rows */
    .wave-row {
      position: absolute;
      width: 200%; left: -50%;
      height: 22px;
    }
    .wave-row svg { width: 100%; height: 100%; }
    .wr1 { bottom: 80%; animation: waveDrift1 6s linear infinite; }
    .wr2 { bottom: 65%; animation: waveDrift2 7s linear infinite; opacity:.7; }
    .wr3 { bottom: 48%; animation: waveDrift1 8s linear infinite reverse; opacity:.5; }
    .wr4 { bottom: 30%; animation: waveDrift2 5s linear infinite; opacity:.9; }
    .wr5 { bottom: 12%; animation: waveDrift1 9s linear infinite reverse; opacity:.6; }
    @keyframes waveDrift1 { 0% { transform:translateX(0); } 100% { transform:translateX(25%); } }
    @keyframes waveDrift2 { 0% { transform:translateX(0); } 100% { transform:translateX(-25%); } }
 
    .sparkle {
      position: absolute;
      width: 3px; height: 3px;
      background: rgba(255,255,200,0.9);
      border-radius: 50%;
      animation: sparkleAnim var(--sd, 2s) ease-in-out infinite alternate;
    }
    @keyframes sparkleAnim {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1.5); }
    }
 
    /* ── DOLPHINS ── */
    .dolphin { position: absolute; animation: dolphinSwim linear infinite; }
    @keyframes dolphinSwim { 0% { left:-120px; } 100% { left:110%; } }
    @keyframes dolphinBob {
      0%,100% { transform: translateY(0px) rotate(-5deg); }
      25%      { transform: translateY(-28px) rotate(10deg); }
      50%      { transform: translateY(0px) rotate(-5deg); }
      75%      { transform: translateY(-14px) rotate(5deg); }
    }
    @keyframes dolphinBob2 {
      0%,100% { transform: translateY(0px) rotate(-3deg); }
      30%      { transform: translateY(-35px) rotate(12deg); }
      60%      { transform: translateY(5px) rotate(-8deg); }
    }
    .d1 { top:8%;  animation-duration:14s; }
    .d1 .db { animation: dolphinBob 2.5s ease-in-out infinite; }
    .d2 { top:35%; animation-duration:18s; animation-delay:-5s; }
    .d2 .db { animation: dolphinBob2 3s ease-in-out infinite; }
    .d3 { top:55%; animation-duration:12s; animation-delay:-9s; }
    .d3 .db { animation: dolphinBob 2s ease-in-out infinite; }
    .d4 { top:20%; animation-duration:22s; animation-delay:-12s; animation-direction:reverse; }
    .d4 .db { animation: dolphinBob2 3.5s ease-in-out infinite; }
    .d4 svg { transform: scaleX(-1); }
 
    /* ── BEACH ── */
    .beach {
      position: absolute;
      bottom: 0; left: 0; right: 0; height: 22%;
      background: linear-gradient(to bottom, #e8c97a 0%, #d4aa55 50%, #b8922a 100%);
      border-radius: 60% 60% 0 0 / 20% 20% 0 0;
    }
    .beach::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 12px;
      background: rgba(255,240,180,0.5);
      border-radius: inherit; filter: blur(3px);
    }
    .sand-dot {
      position: absolute; border-radius: 50%;
      background: rgba(180,130,30,0.3);
    }
 
    /* ── PEOPLE ── */
    .person {
      position: absolute; bottom: 0;
      animation: personSway 4s ease-in-out infinite alternate;
    }
    @keyframes personSway {
      from { transform: rotate(-1.5deg); }
      to   { transform: rotate(1.5deg); }
    }
    .umbrella {
      position: absolute; bottom: 0;
      animation: umbrellaWiggle 5s ease-in-out infinite alternate;
      transform-origin: bottom center;
    }
    @keyframes umbrellaWiggle {
      from { transform: rotate(-2deg); }
      to   { transform: rotate(2deg); }
    }
 
    /* ── PALM ── */
    .palm { position: absolute; bottom: 0; }
    .palm-frond {
      transform-origin: bottom center;
      animation: frondSway 3s ease-in-out infinite alternate;
    }
    @keyframes frondSway {
      from { transform: rotate(-8deg); }
      to   { transform: rotate(8deg); }
    }
 
    /* ── HEADING ── */
    .heading-wrap {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; z-index: 50;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: clamp(2.2rem, 6vw, 5.5rem);
      letter-spacing: 0.04em;
      text-align: center;
      color: #fff8e7;
      text-shadow: 0 2px 8px rgba(0,0,0,0.55), 0 0 40px rgba(255,200,80,0.6), 0 0 80px rgba(255,150,40,0.3);
      animation: titleFloat 5s ease-in-out infinite alternate;
      padding: 0 20px;
    }
    @keyframes titleFloat {
      from { transform: translateY(0px); }
      to   { transform: translateY(-8px); text-shadow: 0 8px 24px rgba(0,0,0,.4), 0 0 60px rgba(255,200,80,.9); }
    }
  </style>
</head>

<script>
  // Stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2.5 + 0.8;
    s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*90}%;left:${Math.random()*100}%;--d:${(Math.random()*3+1.5).toFixed(1)}s;animation-delay:${(Math.random()*4).toFixed(1)}s;opacity:${(Math.random()*0.6+0.3).toFixed(2)};`;
    starsEl.appendChild(s);
  }
  // Sea sparkles
  const seaEl = document.getElementById('sea');
  for (let i = 0; i < 28; i++) {
    const sp = document.createElement('div');
    sp.className = 'sparkle';
    sp.style.cssText = `top:${Math.random()*80+5}%;left:${Math.random()*100}%;--sd:${(Math.random()*2+1).toFixed(1)}s;animation-delay:${(Math.random()*3).toFixed(1)}s;`;
    seaEl.appendChild(sp);
  }
  // Sand dots
  const beachEl = document.getElementById('beach');
  for (let i = 0; i < 50; i++) {
    const d = document.createElement('div');
    d.className = 'sand-dot';
    const sz = Math.random() * 5 + 2;
    d.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*80+10}%;left:${Math.random()*100}%;`;
    beachEl.appendChild(d);
  }
</script>
